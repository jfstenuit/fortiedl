# Overlay for `make dev`: exposes the DB port to the host and reconfigures
# nginx to proxy to the Flask debug server running on the host machine.
services:
  db:
    ports:
      - "5432:5432"

  proxy:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
